<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1420" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F2E9"/>
      <stop offset="0.52" stop-color="#EFE5D8"/>
      <stop offset="1" stop-color="#E6DDD0"/>
    </linearGradient>
    <linearGradient id="deep" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#123B36"/>
      <stop offset="1" stop-color="#245A52"/>
    </linearGradient>
    <linearGradient id="phoneShell" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#182E2A"/>
      <stop offset="1" stop-color="#14221F"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D66B2C"/>
      <stop offset="1" stop-color="#B9551E"/>
    </linearGradient>
    <filter id="blurA" x="-200" y="-120" width="580" height="580" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blurB" x="1180" y="760" width="520" height="520" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="panelShadow" x="60" y="40" width="1480" height="1120" filterUnits="userSpaceOnUse">
      <feOffset dy="24"/>
      <feGaussianBlur stdDeviation="28"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.08 0 0 0 0 0.12 0 0 0 0 0.11 0 0 0 0.16 0"/>
    </filter>
    <style>
      .sans { font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif; }
      .serif { font-family: "STZhongsong", "Songti SC", serif; }
      .muted { fill: #64736D; }
      .ink { fill: #192320; }
      .tiny { font-size: 14px; letter-spacing: 0.16em; }
      .label { font-size: 16px; }
      .body { font-size: 24px; }
      .small { font-size: 18px; }
      .mid { font-size: 22px; }
      .large { font-size: 34px; }
    </style>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <g filter="url(#blurA)">
    <circle cx="90" cy="150" r="120" fill="#E3A372" fill-opacity="0.55"/>
  </g>
  <g filter="url(#blurB)">
    <circle cx="1440" cy="1010" r="110" fill="#4A9085" fill-opacity="0.38"/>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="100" y="84" width="720" height="1030" rx="34" fill="#FFFCF8" fill-opacity="0.88"/>
    <rect x="860" y="84" width="640" height="1030" rx="34" fill="#FFFCF8" fill-opacity="0.88"/>
  </g>

  <text x="152" y="156" class="sans tiny muted">HUNAN DIALECT APP / MULTI-AGENT PROTOTYPE</text>
  <text x="152" y="258" class="serif" font-size="92" fill="#112823">湘语通</text>
  <text x="152" y="332" class="sans body ink">把现有“湖南方言转换 + 词库审核 + 效果评测”重组为移动端 App，</text>
  <text x="152" y="372" class="sans body ink">由翻译、纠错、词库、评测四个 Agent 协同完成用户任务。</text>

  <g>
    <rect x="152" y="430" width="198" height="108" rx="24" fill="#FFF7EF" stroke="#D9D0C3"/>
    <rect x="366" y="430" width="198" height="108" rx="24" fill="#FFF7EF" stroke="#D9D0C3"/>
    <rect x="580" y="430" width="198" height="108" rx="24" fill="#FFF7EF" stroke="#D9D0C3"/>
    <text x="176" y="468" class="sans label muted">场景驱动</text>
    <text x="176" y="506" class="sans small ink">日常 / 校园 / 文旅 / 短视频</text>
    <text x="390" y="468" class="sans label muted">多方言</text>
    <text x="390" y="506" class="sans small ink">长沙 / 湘潭 / 株洲</text>
    <text x="604" y="468" class="sans label muted">闭环能力</text>
    <text x="604" y="506" class="sans small ink">转换 + 审核 + 评测</text>
  </g>

  <text x="152" y="620" class="sans large ink">多 Agent 编排</text>
  <text x="538" y="620" class="sans small muted">把网页能力拆成更适合 App 的协作链路</text>

  <g>
    <rect x="152" y="660" width="626" height="96" rx="24" fill="#FFF9F2" stroke="#D8CEC2"/>
    <rect x="152" y="772" width="626" height="96" rx="24" fill="#FFF9F2" stroke="#D8CEC2"/>
    <rect x="152" y="884" width="626" height="96" rx="24" fill="#FFF9F2" stroke="#D8CEC2"/>
    <rect x="152" y="996" width="626" height="96" rx="24" fill="#FFF9F2" stroke="#D8CEC2"/>

    <rect x="176" y="684" width="46" height="46" rx="14" fill="url(#deep)"/>
    <rect x="176" y="796" width="46" height="46" rx="14" fill="url(#deep)"/>
    <rect x="176" y="908" width="46" height="46" rx="14" fill="url(#deep)"/>
    <rect x="176" y="1020" width="46" height="46" rx="14" fill="url(#deep)"/>
    <text x="193" y="714" class="sans small" fill="#FFF8F1">T</text>
    <text x="193" y="826" class="sans small" fill="#FFF8F1">F</text>
    <text x="193" y="938" class="sans small" fill="#FFF8F1">L</text>
    <text x="193" y="1050" class="sans small" fill="#FFF8F1">E</text>

    <text x="244" y="698" class="sans mid ink">翻译 Agent</text>
    <text x="244" y="731" class="sans small muted">负责普通话与湖南方言的主结果生成</text>
    <text x="682" y="714" class="sans small" fill="#9F4F21">运行中</text>

    <text x="244" y="810" class="sans mid ink">纠错 Agent</text>
    <text x="244" y="843" class="sans small muted">承接拼音近似匹配与候选表达生成</text>
    <text x="682" y="826" class="sans small" fill="#9F4F21">辅助中</text>

    <text x="244" y="922" class="sans mid ink">词库 Agent</text>
    <text x="244" y="955" class="sans small muted">沉淀新增词条、删除申请与场景词汇</text>
    <text x="682" y="938" class="sans small" fill="#9F4F21">待复核</text>

    <text x="244" y="1034" class="sans mid ink">评测 Agent</text>
    <text x="244" y="1067" class="sans small muted">汇总评分并反向推动词库优化</text>
    <text x="682" y="1050" class="sans small" fill="#9F4F21">已同步</text>
  </g>

  <g>
    <text x="912" y="132" class="sans small muted">Prototype Preview</text>
    <circle cx="890" cy="125" r="6" fill="#28A168"/>
    <text x="1088" y="132" class="sans small muted">智能转译</text>
  </g>

  <g>
    <rect x="980" y="160" width="396" height="860" rx="48" fill="url(#phoneShell)"/>
    <rect x="1114" y="174" width="126" height="24" rx="12" fill="#0D1513"/>
    <rect x="996" y="214" width="364" height="782" rx="34" fill="#FAF4EC"/>

    <text x="1024" y="250" class="sans small muted">主工作台</text>
    <text x="1024" y="294" class="sans large ink">智能转译</text>
    <rect x="1240" y="244" width="96" height="40" rx="20" fill="#EAF2F0"/>
    <text x="1263" y="269" class="sans label" fill="#174F48">切换方向</text>

    <rect x="1024" y="326" width="148" height="58" rx="18" fill="#FFFDF9" stroke="#D7CDC0"/>
    <rect x="1188" y="326" width="148" height="58" rx="18" fill="#FFFDF9" stroke="#D7CDC0"/>
    <text x="1042" y="348" class="sans label muted">方言</text>
    <text x="1042" y="372" class="sans small ink">长沙口语</text>
    <text x="1206" y="348" class="sans label muted">场景</text>
    <text x="1206" y="372" class="sans small ink">日常交流</text>

    <rect x="1024" y="404" width="312" height="70" rx="20" fill="#FFF8F0" stroke="#D7CDC0"/>
    <text x="1042" y="434" class="sans small muted">适合家常聊天与口语交流，优先使用高频生活表达。</text>

    <rect x="1024" y="492" width="312" height="116" rx="22" fill="#FFFDF9" stroke="#D7CDC0"/>
    <text x="1044" y="520" class="sans label muted">输入一句普通话</text>
    <text x="1044" y="560" class="sans small ink">你今天去哪里，吃饭了吗？</text>

    <rect x="1024" y="626" width="312" height="54" rx="20" fill="url(#cta)"/>
    <text x="1100" y="660" class="sans small" fill="#FFF8F1">开始协同转译</text>

    <rect x="1024" y="700" width="312" height="126" rx="24" fill="#FFF8F0" stroke="#D7CDC0"/>
    <text x="1044" y="730" class="sans label muted">主结果</text>
    <text x="1044" y="772" class="sans body ink">你今朝克哪凯，恰饭了啵？</text>
    <rect x="1044" y="790" width="128" height="24" rx="12" fill="#EEF3F2"/>
    <rect x="1190" y="790" width="128" height="24" rx="12" fill="#EEF3F2"/>
    <text x="1056" y="807" class="sans" font-size="13" fill="#174F48">翻译 Agent 词条命中 4 次</text>
    <text x="1202" y="807" class="sans" font-size="13" fill="#174F48">纠错 Agent 容错补偿 1 次</text>

    <rect x="1024" y="846" width="312" height="98" rx="24" fill="#FFF8F0" stroke="#D7CDC0"/>
    <text x="1044" y="876" class="sans label muted">候选表达</text>
    <rect x="1044" y="894" width="272" height="34" rx="17" fill="#FFFEFB" stroke="#E3DBD0"/>
    <text x="1060" y="916" class="sans" font-size="13" fill="#1B2320">#1 主推荐  你今朝克哪凯，恰饭了啵？</text>

    <rect x="1016" y="956" width="324" height="28" rx="14" fill="#142724"/>
    <rect x="1030" y="962" width="70" height="16" rx="8" fill="#FFF8EF"/>
    <text x="1052" y="974" class="sans" font-size="11" fill="#122823">转译</text>
    <text x="1120" y="974" class="sans" font-size="11" fill="#FFF8EF" fill-opacity="0.72">词库</text>
    <text x="1190" y="974" class="sans" font-size="11" fill="#FFF8EF" fill-opacity="0.72">审核</text>
    <text x="1260" y="974" class="sans" font-size="11" fill="#FFF8EF" fill-opacity="0.72">洞察</text>
  </g>
</svg>
