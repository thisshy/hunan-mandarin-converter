<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>湘言通 App</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="grain"></div>

  <main class="studio">
    <section class="brief-panel">
      <p class="eyebrow">XIANGYAN APP</p>
      <h1>湘言通</h1>
      <p class="lede">湖南方言与普通话互转 App 原型</p>

      <div class="brief-stats" id="briefStats"></div>
    </section>

    <section class="device-stage">
      <div class="device-glow"></div>
      <div class="device-shell">
        <div class="notch"></div>
        <div class="screen-header">
          <div>
            <p class="screen-brand">湘言通</p>
            <h2>湖南方言与普通话互转</h2>
          </div>
          <div class="status-cluster">
            <span class="status-pill" id="statusPill">词库在线</span>
            <span class="time-pill" id="timePill">09:41</span>
          </div>
        </div>

        <div class="screen-body">
          <section class="screen is-active" data-screen="translate">
            <div class="surface surface-hero">
              <div>
                <p class="surface-kicker">实时互转</p>
                <h3 id="modeHeadline">普通话 → 长沙话</h3>
                <p id="modeDescription">场景化双向转换</p>
              </div>
              <button class="ghost-btn" id="swapBtn" type="button">切换方向</button>
            </div>

            <div class="control-row">
              <label class="control">
                <span>方言区域</span>
                <select id="dialectSelect"></select>
              </label>
              <label class="control">
                <span>场景包</span>
                <select id="sceneSelect"></select>
              </label>
            </div>

            <div class="surface editor-surface">
              <label for="sourceInput">输入文本</label>
              <textarea id="sourceInput" placeholder="例如：你今天去哪里，吃饭了吗？"></textarea>
              <div class="quick-phrases" id="quickPhrases"></div>
            </div>

            <div class="action-row">
              <button class="primary-btn" id="convertBtn" type="button">立即转译</button>
              <p class="mini-note" id="sceneTip">优先使用当前场景的表达习惯与局部词包。</p>
            </div>

            <div class="surface result-surface">
              <div class="result-head">
                <div>
                  <span class="block-label">推荐结果</span>
                  <p class="mini-note" id="resultMeta">候选表达与推荐结果</p>
                </div>
                <button class="ghost-btn small" id="applyCandidateBtn" type="button">应用首选</button>
              </div>
              <div class="result-output" id="resultOutput">点击“立即转译”后在这里显示结果。</div>
              <div class="candidate-list" id="candidateList"></div>
            </div>
          </section>

          <section class="screen" data-screen="scene">
            <div class="surface section-head">
              <div>
                <p class="surface-kicker">场景与区域</p>
                <h3>常用场景包</h3>
              </div>
            </div>
            <div class="feature-scene" id="featureScene"></div>
            <div class="scene-grid" id="sceneGrid"></div>
            <div class="region-list" id="regionList"></div>
          </section>

          <section class="screen" data-screen="lexicon">
            <div class="surface section-head">
              <div>
                <p class="surface-kicker">词库维护</p>
                <h3>审核与词库管理</h3>
              </div>
            </div>

            <div class="search-row">
              <input id="lexiconSearch" type="text" placeholder="搜索普通话或方言词条">
              <span class="inline-stat" id="lexiconCount">词条 0</span>
            </div>

            <div class="surface queue-surface">
              <div class="section-inline-head">
                <span class="block-label">待审核</span>
                <span class="inline-stat" id="pendingCount">0 条</span>
              </div>
              <div class="queue-list" id="queueList"></div>
            </div>

            <div class="surface lexicon-surface">
              <div class="section-inline-head">
                <span class="block-label">词库快照</span>
                <span class="inline-stat">高频词优先</span>
              </div>
              <div class="lexicon-list" id="lexiconList"></div>
            </div>
          </section>

          <section class="screen" data-screen="insights">
            <div class="surface section-head">
              <div>
                <p class="surface-kicker">质量评测</p>
                <h3>转换质量与反馈</h3>
              </div>
            </div>

            <div class="insight-stats" id="insightStats"></div>

            <div class="surface chart-surface">
              <div class="section-inline-head">
                <span class="block-label">近阶段趋势</span>
                <span class="inline-stat" id="trendCaption">按周模拟</span>
              </div>
              <div class="trend-chart" id="trendChart"></div>
            </div>

            <div class="surface records-surface">
              <div class="section-inline-head">
                <span class="block-label">最近评测</span>
                <span class="inline-stat">转换结果人工回看</span>
              </div>
              <div class="record-list" id="recordList"></div>
            </div>
          </section>
        </div>

        <nav class="bottom-nav" id="bottomNav"></nav>
      </div>
    </section>
  </main>

  <script src="./data/app-data.js"></script>
  <script src="./data/default-lexicon.js"></script>
  <script src="./app.js"></script>
</body>
</html>
